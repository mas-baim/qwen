<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baim Photo Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1a73e8;
      --blue-dark: #1557b0;
      --sidebar-bg: #f8f9fa;
      --border: #e0e0e0;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --hover-bg: #e8f0fe;
      --active-bg: #d2e3fc;
      --white: #ffffff;
      --shadow: 0 2px 10px rgba(0,0,0,0.12);
      --radius: 12px;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .app-window {
      width: 100%;
      max-width: 960px;
      background: var(--white);
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.16);
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--blue);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .traffic-lights {
      display: flex;
      gap: 6px;
    }
    .traffic-lights span {
      width: 13px; height: 13px;
      border-radius: 50%;
      display: block;
    }
    .tl-red   { background: #ff5f57; }
    .tl-yellow{ background: #febc2e; }
    .tl-green { background: #28c840; }

    .header-title {
      font-family: 'Google Sans', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.3px;
    }

    /* ── HAMBURGER BUTTON ── */
    .hamburger-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      margin-left: 10px;
    }
    .hamburger-btn span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--white);
      margin: 5px 0;
      border-radius: 2px;
      transition: all 0.3s;
    }
    .hamburger-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .hamburger-btn.active span:nth-child(2) {
      opacity: 0;
    }
    .hamburger-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    .btn-signin {
      background: #34a853;
      color: var(--white);
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signin:hover { background: #2d9249; }

    /* ── BODY ── */
    .body {
      display: flex;
      min-height: 600px;
      position: relative;
    }

    /* ── SIDEBAR OVERLAY ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }
    .sidebar-overlay.active {
      display: block;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      transition: transform 0.3s ease;
    }

    .sidebar-logo {
      padding: 0 20px 16px;
    }
    .sidebar-logo svg {
      width: 36px; height: 36px;
    }

    .sidebar-nav {
      list-style: none;
    }

    .sidebar-nav li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 0 24px 24px 0;
      margin-right: 12px;
      transition: background 0.15s;
    }
    .sidebar-nav li:hover { background: var(--hover-bg); color: var(--blue); }
    .sidebar-nav li.active {
      background: var(--active-bg);
      color: var(--blue);
      font-weight: 500;
    }
    .sidebar-nav li svg {
      flex-shrink: 0;
      color: inherit;
    }

    /* Submenu styles */
    .sidebar-nav .submenu {
      list-style: none;
      padding-left: 20px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .sidebar-nav .submenu.open {
      max-height: 500px;
    }
    .sidebar-nav .submenu li {
      padding: 7px 20px;
      font-size: 13px;
      margin-right: 0;
      border-radius: 0;
    }
    .sidebar-nav .submenu li.active {
      background: var(--active-bg);
      color: var(--blue);
      font-weight: 500;
      border-radius: 0 24px 24px 0;
    }
    .sidebar-nav .parent-item {
      font-weight: 500;
    }
    .sidebar-nav .parent-item svg.chevron {
      transition: transform 0.3s;
      margin-left: auto;
    }
    .sidebar-nav .parent-item.expanded svg.chevron {
      transform: rotate(90deg);
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state */
    .error-message {
      background: #fce8e6;
      color: #c5221f;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin: 20px;
    }

    /* ── MAIN ─ */
    .main {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .current-folder {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── GALLERY GRID ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .gallery-item {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      background: #ddd;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.16);
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Eye overlay */
    .eye-overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 50, 90, 0.45);
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gallery-item:hover .eye-overlay,
    .gallery-item.has-overlay .eye-overlay {
      opacity: 1;
    }

    .eye-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .eye-icon svg {
      color: white;
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 4px;
      border-top: 1px solid var(--border);
    }

    .page-btns {
      display: flex;
      gap: 8px;
    }
    .page-btns button {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .page-btns button:hover { background: var(--hover-bg); border-color: var(--blue); color: var(--blue); }
    .page-btns button.active { background: var(--blue); color: white; border-color: var(--blue); }

    .per-page {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .per-page:hover { color: var(--blue); }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .lightbox.active {
      display: flex;
      opacity: 1;
    }

    .lightbox-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 1001;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.25);
      transform: rotate(90deg);
    }
    .lightbox-close svg {
      color: white;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 1001;
    }
    .lightbox-nav:hover {
      background: rgba(255,255,255,0.25);
    }
    .lightbox-nav svg {
      color: white;
    }
    .lightbox-prev {
      left: 20px;
    }
    .lightbox-next {
      right: 20px;
    }

    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 20px;
      z-index: 1001;
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      body {
        padding: 0;
      }

      .app-window {
        border-radius: 0;
        max-width: 100%;
      }

      .hamburger-btn {
        display: block;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 100;
        transform: translateX(-100%);
        box-shadow: 4px 0 20px rgba(0,0,0,0.2);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      /* Tetap 3 kolom di mobile */
      .gallery {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .header-title {
        font-size: 16px;
      }

      .main {
        padding: 16px;
      }

      /* Lightbox mobile */
      .lightbox-nav {
        width: 40px;
        height: 40px;
      }
      .lightbox-prev {
        left: 10px;
      }
      .lightbox-next {
        right: 10px;
      }
      .lightbox-close {
        top: 10px;
        right: 10px;
        width: 38px;
        height: 38px;
      }
    }

    @media (max-width: 480px) {
      /* Tetap 3 kolom di layar sangat kecil */
      .gallery {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .gallery-item {
        border-radius: 8px;
      }

      .eye-icon {
        width: 28px;
        height: 28px;
      }

      .eye-icon svg {
        width: 14px;
        height: 14px;
      }

      .btn-signin {
        padding: 6px 12px;
        font-size: 12px;
      }

      /* Lightbox mobile kecil */
      .lightbox-nav {
        width: 36px;
        height: 36px;
      }
      .lightbox-prev {
        left: 8px;
      }
      .lightbox-next {
        right: 8px;
      }
      .lightbox-close {
        width: 34px;
        height: 34px;
      }
    }
  </style>
</head>
<body>

<div class="app-window">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <button class="hamburger-btn" id="hamburgerBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="traffic-lights">
        <span class="tl-red"></span>
        <span class="tl-yellow"></span>
        <span class="tl-green"></span>
      </div>
      <span class="header-title">Baim Photo Gallery</span>
    </div>
  </div>

  <!-- SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- BODY -->
  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
          <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
          <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
          <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
          <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
          <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
          <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
        </svg>
      </div>

      <ul class="sidebar-nav" id="sidebarNav">
        <li class="loading">
          <div class="spinner"></div>
        </li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="current-folder" id="currentFolder">Loading...</div>
      <div class="gallery" id="gallery">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>

</div>

<!-- LIGHTBOX MODAL -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="lightbox-content">
    <img src="" alt="" class="lightbox-img" id="lightboxImg"/>
  </div>
  <button class="lightbox-nav lightbox-next" id="lightboxNext">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
  <div class="lightbox-counter" id="lightboxCounter">1 / 9</div>
</div>

<script>
  // ==========================================
  // 1. KONFIGURASI (WAJIB DIISI)
  // ==========================================
  const CONFIG = {
    // Ganti dengan URL Web App Apps Script Anda (yang berakhiran /exec)
    PROXY_URL: 'https://script.google.com/macros/s/AKfycbyHxBev3KsH-TPGt8HSfq4QjVa1zPydU16k0WVyY0rILfnlhFt5IjBKv-IFmCAzGnmWQA/exec',
    
    // Ganti dengan ID Folder Utama Google Drive Anda
    ROOT_FOLDER_ID: '1ClDkylC4qbQu0EmsEUmRMCoXJ1RS5stA' 
  };

  // State global
  let currentImages = [];
  let currentYearName = '';
  let currentMonthName = '';

  // ==========================================
  // 2. FUNGSI FETCH KE PROXY
  // ==========================================
  async function fetchFromProxy(type, folderId) {
    const url = `${CONFIG.PROXY_URL}?type=${type}&folderId=${folderId}`;
    console.log(`Fetching ${type} from:`, url);
    
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Gagal terhubung ke server (Status: ${response.status})`);
    
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    
    return data.files || [];
  }

  // ==========================================
  // 3. FUNGSI RENDER & LOGIKA UTAMA
  // ==========================================
  async function initGallery() {
    const sidebarNav = document.getElementById('sidebarNav');
    sidebarNav.innerHTML = '<li class="loading"><div class="spinner"></div></li>';

    try {
      // A. Ambil Daftar Tahun
      const years = await fetchFromProxy('years', CONFIG.ROOT_FOLDER_ID);
      
      if (years.length === 0) {
        sidebarNav.innerHTML = '<li style="padding:20px;">Tidak ada folder tahun ditemukan.</li>';
        return;
      }

      // B. Render Sidebar Tahun
      let sidebarHTML = '';
      years.forEach((year, index) => {
        const isFirst = index === 0 ? 'active expanded' : '';
        const isOpen = index === 0 ? 'open' : '';
        
        sidebarHTML += `
          <li class="parent-item ${isFirst}" data-year-id="${year.id}" data-year-name="${year.name}" onclick="handleYearClick('${year.id}', '${year.name}', this)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            ${year.name}
            <svg class="chevron" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </li>
          <ul class="submenu ${isOpen}" id="submenu-${year.name}">
            <li class="loading" style="padding: 10px 20px;"><div class="spinner" style="width:20px;height:20px;border-width:2px;"></div></li>
          </ul>
        `;
      });
      sidebarNav.innerHTML = sidebarHTML;

      // C. Auto-load bulan pertama dari tahun pertama
      const firstYear = years[0];
      await handleYearClick(firstYear.id, firstYear.name, document.querySelector(`[data-year-name="${firstYear.name}"]`), true);

    } catch (error) {
      console.error("Init Error:", error);
      document.getElementById('sidebarNav').innerHTML = `<li class="error-message" style="padding:20px; color:red;">${error.message}</li>`;
    }
  }

  async function handleYearClick(yearId, yearName, element, isAutoLoad = false) {
    if (!isAutoLoad) {
      // Toggle UI
      const submenu = document.getElementById(`submenu-${yearName}`);
      const isOpen = submenu.classList.contains('open');
      
      // Tutup semua submenu lain
      document.querySelectorAll('.submenu').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.parent-item').forEach(el => el.classList.remove('active', 'expanded'));

      if (!isOpen) {
        submenu.classList.add('open');
        element.classList.add('active', 'expanded');
      } else {
        return; // Jika sudah terbuka, jangan lakukan apa-apa
      }
    }

    // Jika submenu kosong (belum di-load), ambil datanya
    const submenu = document.getElementById(`submenu-${yearName}`);
    if (submenu.querySelector('.loading')) {
      try {
        const months = await fetchFromProxy('months', yearId);
        
        let monthsHTML = '';
        months.forEach((month, index) => {
          const isActive = (index === 0 && !currentMonthName) ? 'active' : '';
          monthsHTML += `<li class="${isActive}" onclick="handleMonthClick('${yearName}', '${month.name}', '${month.id}', this)">${month.name}</li>`;
        });
        submenu.innerHTML = monthsHTML;

        // Auto-load bulan pertama jika ini auto-load tahun pertama
        if (isAutoLoad && months.length > 0) {
          await handleMonthClick(yearName, months[0].name, months[0].id, submenu.querySelector('li'));
        }
      } catch (error) {
        submenu.innerHTML = `<li style="padding:10px 20px; color:red;">Gagal memuat bulan</li>`;
      }
    }
  }

  async function handleMonthClick(yearName, monthName, monthId, element) {
    // Update UI Active State
    document.querySelectorAll('.submenu li').forEach(li => li.classList.remove('active'));
    if (element) element.classList.add('active');

    currentYearName = yearName;
    currentMonthName = monthName;
    document.getElementById('currentFolder').textContent = `${yearName} / ${monthName}`;
    
    // Tampilkan loading di gallery
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const images = await fetchFromProxy('images', monthId);
      currentImages = images;

      if (images.length === 0) {
        gallery.innerHTML = '<div class="loading">Tidak ada foto di folder ini.</div>';
        return;
      }

      // Render Gallery
      let galleryHTML = '';
      images.forEach((img, index) => {
        // URL Thumbnail untuk Grid (w600)
        const thumbUrl = `https://drive.google.com/thumbnail?id=${img.id}&sz=w600`;
        
        galleryHTML += `
          <div class="gallery-item" onclick="openLightbox(${index})">
            <img src="${thumbUrl}" alt="${img.name}" referrerpolicy="no-referrer" loading="lazy" />
            <div class="eye-overlay">
              <div class="eye-icon">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </div>
            </div>
          </div>
        `;
      });
      gallery.innerHTML = galleryHTML;

    } catch (error) {
      console.error("Load Images Error:", error);
      gallery.innerHTML = `<div class="error-message">Gagal memuat gambar: ${error.message}</div>`;
    }
  }

  // ==========================================
  // 4. FUNGSI LIGHTBOX
  // ==========================================
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCounter = document.getElementById('lightboxCounter');
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    updateLightboxImage();
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden'; // Kunci scroll background
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = ''; // Buka kunci scroll
  }

  function updateLightboxImage() {
    const img = currentImages[currentIndex];
    // URL Full Size untuk Lightbox (w1600)
    const fullUrl = `https://drive.google.com/thumbnail?id=${img.id}&sz=w1600`;
    
    lightboxImg.src = fullUrl;
    lightboxImg.alt = img.name;
    lightboxImg.setAttribute('referrerpolicy', 'no-referrer'); // WAJIB agar gambar muncul
    lightboxCounter.textContent = `${currentIndex + 1} / ${currentImages.length}`;
  }

  function nextImage(e) {
    if(e) e.stopPropagation();
    currentIndex = (currentIndex + 1) % currentImages.length;
    updateLightboxImage();
  }

  function prevImage(e) {
    if(e) e.stopPropagation();
    currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
    updateLightboxImage();
  }

  // Event Listeners Lightbox
  document.getElementById('lightboxClose').addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
  document.getElementById('lightboxNext').addEventListener('click', nextImage);
  document.getElementById('lightboxPrev').addEventListener('click', prevImage);
  
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target.classList.contains('lightbox-content')) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') nextImage();
    else if (e.key === 'ArrowLeft') prevImage();
  });

  // ==========================================
  // 5. INISIALISASI
  // ==========================================
  window.addEventListener('DOMContentLoaded', initGallery);

  // Hamburger Menu Logic (Tetap sama seperti sebelumnya)
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  function toggleSidebar() {
    hamburgerBtn.classList.toggle('active');
    sidebar.classList.toggle('active');
    sidebarOverlay.classList.toggle('active');
  }
  function closeSidebar() {
    hamburgerBtn.classList.remove('active');
    sidebar.classList.remove('active');
    sidebarOverlay.classList.remove('active');
  }
  hamburgerBtn.addEventListener('click', toggleSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);
</script>
</body>
</html>
